                                            <h3 className="text-sm font-bold text-gray-300 uppercase tracking-widest mb-4 flex items-center">
                                                <i data-lucide="file-check" className="w-4 h-4 mr-2 text-gold"></i> 1. Hồ Sơ Pháp Lý (KYC)
                                            </h3>
                                            <div className="space-y-3 text-sm">
                                                <div className="flex justify-between"><span className="text-gray-500">CMND/CCCD</span><span className="text-white font-mono bg-gray-900 px-2 py-1 rounded">{mockClientB2C.kyc.id}</span></div>
                                                <div className="flex justify-between"><span className="text-gray-500">Hộ khẩu cư trú</span><span className="text-white">{mockClientB2C.kyc.residence}</span></div>
                                                <div className="flex justify-between items-center"><span className="text-gray-500">Dữ liệu FaceID (An ninh)</span><span className="text-neon-green flex items-center bg-green-950/30 px-2 py-1 rounded border border-green-900"><i data-lucide="check-circle-2" className="w-4 h-4 mr-1"></i> Đã đồng bộ</span></div>
                                            </div>
                                        </div>

                                        <div className="bg-surface p-6 rounded-xl border border-gray-800 interactive-card">
                                            <h3 className="text-sm font-bold text-gray-300 uppercase tracking-widest mb-4 flex items-center">
                                                <i data-lucide="scroll-text" className="w-4 h-4 mr-2 text-cyan-400"></i> 2. Hợp Đồng & Tài Chính
                                            </h3>
                                            <div className="space-y-3">
                                                <div><p className="text-xs text-gray-500">Danh mục Tài sản (Portfolio)</p><p className="font-medium text-white text-sm mt-1">{mockClientB2C.portfolio}</p></div>
                                                <div className="grid grid-cols-2 gap-3 text-sm pt-2 border-t border-gray-800">
                                                    <div><p className="text-xs text-gray-500 mb-1">HĐMB Số</p><p className="text-white font-mono">{mockClientB2C.contract.no}</p></div>
                                                    <div><p className="text-xs text-gray-500 mb-1">Tiến độ thanh toán</p><p className="font-bold text-neon-green">{mockClientB2C.finance.paid}</p></div>

                                                <div className="bg-gray-900 p-3 rounded border border-gray-700 text-xs flex justify-between">

                                            <div className="space-y-4">
                                                <div><p className="text-xs text-gray-500 mb-1">Lịch sử Yêu cầu Dịch vụ (Ticketing)</p><p className="text-sm text-gray-300 bg-gray-900 p-2 rounded">{mockClientB2C.ops.tickets}</p></div>
                                                <div>

                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-surface p-6 rounded-xl border border-gray-800 interactive-card">

                                                <i data-lucide="gift" className="w-4 h-4 mr-2 text-gold"></i> 4. Loyalty & Mạng Lưới Giới Thiệu
                                            </h3>

                                                <div><p className="text-xs text-gray-500 mb-2">Đặc quyền đang hưởng</p><p className="text-gold font-medium bg-gold/10 p-3 rounded border border-gold/30">{mockClientB2C.loyalty.privileges}</p></div>
                                                <div><p className="text-xs text-gray-500 mb-2">Mạng lưới Referral (Giới thiệu)</p><p className="text-white flex items-center bg-gray-900 p-2 rounded"><i data-lucide="users" className="w-4 h-4 mr-2 text-gray-400"></i> {mockClientB2C.loyalty.referrals}</p></div>

                                        </div>

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');

            React.useEffect(() => {
                lucide.createIcons();
            });

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <DashboardScreen />;
                    case 'crm': return <CRMScreen />;
                    case 'cart': return <CartScreen />;
                    case 'saleskit': return <SalesKitScreen />;
                    case 'masterplan': return <MasterplanScreen />;
                    case 'proposal': return <ProposalScreen />;
                    case 'profile': return <ProfileScreen />;
                    case 'cdp': return <CDPScreen />;
                    default: return <DashboardScreen />;
                }
            };

            return (
                <div className="flex h-full w-full bg-black overflow-hidden text-white font-inter">
                    {/* Sidebar Nav */}
                    <div className="w-20 lg:w-72 glass-panel border-y-0 border-l-0 rounded-none flex flex-col z-20 border-r border-gray-800">
                        <div className="p-6 flex items-center justify-center lg:justify-start lg:px-8 h-24 border-b border-gray-800 bg-surface">
                            <div className="w-12 h-12 bg-gold flex items-center justify-center font-playfair font-black text-black text-xl rounded shadow-glow-gold">OS</div>
                            <span className="hidden lg:block ml-4 font-playfair font-bold text-2xl tracking-widest text-white">DA HOP PROPTECH</span>
                        </div>
                        
                        <nav className="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">

                                { id: 'dashboard', icon: 'bar-chart-2', label: 'Tốc Độ Hiệu Suất' },
                                { id: 'crm', icon: 'users', label: 'CRM Phễu AI' },
                                { id: 'cdp', icon: 'database', label: 'Dữ Liệu Khách Hàng' },
                                { id: 'cart', icon: 'shopping-cart', label: 'Trung Tâm Giao Dịch' },
                                { id: 'saleskit', icon: 'folder-lock', label: 'Tài Liệu & Marketing' },
                                { id: 'masterplan', icon: 'box', label: 'Sa Bàn Ảo 3D' },
                                { id: 'proposal', icon: 'file-signature', label: 'Pitch Deck Trình Chiếu' },
                                { id: 'profile', icon: 'user', label: 'Hồ Sơ Năng Lực' },
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center p-4 rounded-xl transition-all duration-300 group ${
                                        activeTab === item.id 
                                        ? 'bg-gold/10 text-gold border border-gold/30 shadow-[inset_0_0_20px_rgba(212,175,55,0.05)]' 
                                        : 'text-gray-400 hover:bg-surface hover:text-white border border-transparent'
                                    }`}
                                >
                                    <i data-lucide={item.icon} className={`w-5 h-5 mx-auto lg:mx-0 ${activeTab === item.id ? 'text-gold' : 'text-gray-500 group-hover:text-gold'}`}></i>
                                    <span className="hidden lg:block ml-4 font-semibold text-sm tracking-wide">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-6 border-t border-gray-800 flex flex-col items-center lg:items-start lg:flex-row lg:px-8 py-6 bg-surface/30 cursor-pointer hover:bg-surface/80 transition group" onClick={() => setActiveTab('profile')}>
                            <img src="https://i.pravatar.cc/100?img=11" alt="" className="w-12 h-12 rounded-full border-2 border-gold p-0.5 object-cover group-hover:scale-105 transition" />
                            <div className="hidden lg:block ml-4">
                                <p className="text-sm font-bold text-white font-playfair tracking-wide group-hover:text-gold transition">Hoàng Agent</p>
                                <p className="text-xs text-neon-green mt-1 flex items-center"><span className="w-2 h-2 rounded-full bg-neon-green mr-2 animate-pulse"></span> Sẵn sàng</p>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 relative overflow-hidden bg-[#050505]">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
